<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MEMLO</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    :root {
      --bg:     #EDEEE0;
      --text:   #3A3928;
      --olive:  #596828;
      --sub:    #8A8C6A;
      --border: rgba(80,90,40,0.18);
      --btn:    #566B2C;
      --btn2:   #44551F;
    }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    /* ── LOGO ── */
    .topbar {
      position:fixed; top:0; left:0; right:0; z-index:200;
      padding: 20px 22px;
      pointer-events:none;
    }
    .logo {
      display:flex; align-items:center; gap:7px;
      font-family:'DM Sans',sans-serif;
      font-size:13px; font-weight:500;
      letter-spacing:0.1em; color:var(--text);
    }

    /* ── SLIDER ── */
    .track {
      display:flex; width:300%; height:100%;
      will-change:transform;
      transition: transform 0.52s cubic-bezier(0.77,0,0.18,1);
    }
    .slide {
      width:33.3333%; height:100%;
      position:relative; overflow:hidden;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      flex-shrink:0;
    }

    /* ── DOTS ── */
    .dots {
      position:fixed; z-index:200;
      bottom:52px; left:50%; transform:translateX(-50%);
      display:flex; gap:8px;
    }
    .dot {
      width:6px; height:6px; border-radius:3px;
      background: rgba(80,90,40,0.2);
      transition: all 0.3s ease; cursor:pointer;
    }
    .dot.on { background:var(--olive); width:18px; }

    /* ════════════════════════════
       SLIDE 1 — 树苗
    ════════════════════════════ */
    .s1-art {
      margin-bottom: 44px;
    }

    /* ════════════════════════════
       SLIDE 2 — 树 + 小鸟
    ════════════════════════════ */
    .s2-art {
      margin-bottom: 44px;
      position:relative;
    }

    /* ════════════════════════════
       SLIDE 3 — 年轮 + 诗
    ════════════════════════════ */
    .s3 {
      justify-content: flex-end;
      padding-bottom: 52px;
    }
    .s3-rings {
      position:absolute; inset:0;
      pointer-events:none;
    }
    .s3-content {
      position:relative; z-index:2;
      width:100%; padding:0 28px;
      text-align:center;
    }
    .poem {
      font-family:'Lora',serif;
      font-size:19px; line-height:1.72;
      color:var(--text); margin-bottom:28px;
    }
    .btn-primary {
      display:block; width:100%;
      padding:17px; border:none; border-radius:50px;
      background:var(--btn); color:#fff;
      font-family:'DM Sans',sans-serif;
      font-size:16px; font-weight:500;
      cursor:pointer; margin-bottom:14px;
      transition: background .2s, transform .1s;
    }

    /* ════════════════════════════
       SLIDE 4 — 注册表单
    ════════════════════════════ */
    .s4 {
      justify-content:flex-start;
      padding-top:56px;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
    }
    .s4-rings {
      position:absolute; top:0; left:0; right:0;
      height:55%; pointer-events:none; z-index:0;
      opacity:0.13;
    }
    .form-wrap {
      position:relative; z-index:1;
      width:100%; padding:0 22px 60px;
    }
    .form-header {
      text-align:center; margin-bottom:28px;
    }
    .sprout-box {
      width:52px; height:52px;
      background:#fff;
      border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 14px;
      box-shadow:0 2px 12px rgba(0,0,0,0.07);
    }
    .form-title {
      font-family:'Lora',serif;
      font-size:24px; font-weight:500;
      color:var(--olive); margin-bottom:5px;
    }
    .form-sub {
      font-family:'Lora',serif;
      font-style:italic; font-size:13px;
      color:var(--sub);
    }

    /* 输入框 */
    .field {
      position:relative; margin-bottom:12px;
      background:#fff;
      border:1.5px solid var(--border);
      border-radius:14px;
      padding:12px 48px 12px 16px;
      transition: border-color .2s;
    }
    .field:focus-within { border-color: var(--olive); }
    .field-label {
      display:block;
      font-size:12px; font-weight:500;
      color:var(--text); margin-bottom:4px;
      font-family:'DM Sans',sans-serif;
    }
    .field input {
      width:100%; border:none; outline:none;
      background:transparent;
      font-size:14px; color:var(--sub);
      font-family:'DM Sans',sans-serif;
    }
    .field input::placeholder { color:#B8BAA0; }
    .field-icon {
      position:absolute; right:14px; top:50%;
      transform:translateY(-50%);
      color:var(--sub); opacity:0.5;
      font-size:15px; pointer-events:none;
    }

    .register-btn {
      width:100%; padding:17px; border:none;
      border-radius:50px;
      background:var(--btn); color:#fff;
      font-family:'DM Sans',sans-serif;
      font-size:16px; font-weight:500;
      cursor:pointer; margin-top:8px; margin-bottom:20px;
      transition:background .2s, transform .1s;
    }
    .register-btn:active { transform:scale(0.98); }
    .register-btn:disabled { opacity:0.5; }

    .divider {
      display:flex; align-items:center; gap:10px;
      margin-bottom:14px;
    }
    .divider::before,.divider::after {
      content:''; flex:1; height:1px;
      background:var(--border);
    }
    .divider span {
      font-size:12px; color:var(--sub);
      white-space:nowrap;
    }

    .social-row { display:flex; gap:10px; }
    .social-btn {
      flex:1; padding:13px;
      background:transparent;
      border:1.5px solid rgba(80,90,40,0.25);
      border-radius:50px; cursor:pointer;
      font-size:13px; font-weight:500;
      font-family:'DM Sans',sans-serif;
      color:var(--text);
      display:flex; align-items:center;
      justify-content:center; gap:7px;
      transition:background .2s;
    }
    .social-btn:hover { background:rgba(255,255,255,0.6); }

    #errMsg {
      color:#B94040; font-size:12px;
      text-align:center; min-height:18px;
      margin-bottom:8px;
    }

    /* slide text共用 */
    .slide-caption {
      font-family:'Lora',serif;
      font-size:20px; font-weight:400;
      line-height:1.55; text-align:center;
      color:var(--text); padding:0 32px;
    }
  </style>

<!-- 导航点 -->
<div class="dots" id="dotsEl">
  <div class="dot on" onclick="goTo(0)"></div>
  <div class="dot"    onclick="goTo(1)"></div>
  <div class="dot"    onclick="goTo(2)"></div>
</div>

<script>
  var cur = 0;

  function goTo(n) {
    cur = n;
    document.getElementById('track').style.transform = 'translateX(-' + (n*(100/3)) + '%)';
    document.querySelectorAll('.dot').forEach(function(d,i){ d.classList.toggle('on', i===n); });
    document.getElementById('dotsEl').style.display = 'flex';
  }



  // 触摸滑动（仅前3页）
  var tx = 0;
  var track = document.getElementById('track');
  track.addEventListener('touchstart', function(e){ tx = e.touches[0].clientX; }, {passive:true});
  track.addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) < 40) return;

    if (dx < 0 && cur < 2) goTo(cur+1);
    if (dx > 0 && cur > 0) goTo(cur-1);
  });
</script>

<!-- Firebase -->
<script type="module">
  import { db } from './firebase.js';
  import {
    collection, addDoc, query, where, getDocs, limit, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  var _verifyCode  = '';
  var _verifyEmail = '';
  var _codeSent    = false;
  var _countdown   = null;

  // ── 发送验证码 ──────────────────────────────────────────
  window.sendVerifyCode = async function() {
    var name  = document.getElementById('nameIn').value.trim();
    var email = document.getElementById('emailIn').value.trim();
    var msg   = document.getElementById('codeMsg');
    var eMsg  = document.getElementById('errMsg');
    msg.textContent  = '';
    eMsg.textContent = '';

    if (!name)  { eMsg.textContent = 'Please enter your name first.';  return; }
    if (!email) { eMsg.textContent = 'Please enter your email first.'; return; }

    // 生成 6 位随机验证码
    _verifyCode  = Math.floor(100000 + Math.random() * 900000).toString();
    _verifyEmail = email;

    var sendBtn = document.getElementById('sendCodeBtn');
    sendBtn.style.opacity    = '0.5';
    sendBtn.style.pointerEvents = 'none';

    try {
      // 发送 ── 变量名必须和 EmailJS 模板里的 {{}} 一致
      await emailjs.send(
        'service_3ax2kcc',   // Service ID
        'template_1ar60uc',  // Template ID  ← 确认是你自己创建的模板
        {
          to_email: email,        // 模板里写 {{to_email}}
          to_name:  name,         // 模板里写 {{to_name}}
          code:     _verifyCode   // 模板里写 {{code}}
        }
      );

      _codeSent = true;
      msg.style.color     = '#566828';
      msg.textContent     = '✓ Code sent to ' + email;

      // 60 秒倒计时，倒完才能重发
      var secs = 60;
      if (_countdown) clearInterval(_countdown);
      _countdown = setInterval(function() {
        secs--;
        msg.textContent = '✓ Code sent! Resend in ' + secs + 's';
        if (secs <= 0) {
          clearInterval(_countdown);
          sendBtn.style.opacity       = '1';
          sendBtn.style.pointerEvents = 'auto';
          msg.textContent = '';
        }
      }, 1000);

    } catch(e) {
      sendBtn.style.opacity       = '1';
      sendBtn.style.pointerEvents = 'auto';
      eMsg.textContent = 'Failed to send. Error: ' + JSON.stringify(e);
      console.error('EmailJS error:', e);
    }
  };

  // ── 注册 ────────────────────────────────────────────────
  window.doRegister = async function() {
    var name  = document.getElementById('nameIn').value.trim();
    var email = document.getElementById('emailIn').value.trim().toLowerCase();
    var code  = document.getElementById('codeIn').value.trim();
    var err   = document.getElementById('errMsg');
    var btn   = document.getElementById('regBtn');
    err.textContent = '';

    // 验证输入
    if (!name)  { err.textContent = 'Please enter your name.';  return; }
    if (!email) { err.textContent = 'Please enter your email.'; return; }
    if (!_codeSent) {
      err.textContent = 'Please send the verification code first.'; return;
    }
    if (code.length !== 6) {
      err.textContent = 'Please enter the 6-digit code.'; return;
    }
    if (code !== _verifyCode) {
      err.textContent = 'Incorrect code. Please try again.'; return;
    }

    btn.disabled     = true;
    btn.textContent  = 'Planting...';

    try {
      // 1. 查重：Firestore 中是否已有这个邮箱
      var dup = await getDocs(query(
        collection(db, 'users'),
        where('email', '==', email),
        limit(1)
      ));
      if (!dup.empty) {
        err.textContent = 'Email already registered. Please log in.';
        btn.disabled    = false;
        btn.textContent = 'Start planting';
        return;
      }

      // 2. 写 Firestore（自动 doc id 当 uid，不再用 Firebase Auth）
      var docRef = await addDoc(collection(db, 'users'), {
        name:         name,
        email:        email,
        record_count: 0,
        tree_stage:   'seed',
        created_at:   serverTimestamp()
      });

      // 3. 把登录态写入 localStorage（供 home.html / settings.html 识别）
      localStorage.setItem('plunk_uid',   docRef.id);
      localStorage.setItem('plunk_email', email);
      localStorage.setItem('plunk_name',  name);

      // ✅ 注册成功 → 跳转首页
      window.location.href = 'home.html';

    } catch(e) {
      err.textContent = e.message || 'Something went wrong. Please try again.';
      btn.disabled    = false;
      btn.textContent = 'Start planting';
    }
  };
</script>
