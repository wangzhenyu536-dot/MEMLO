<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEMLO · Settings</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .settings-list { max-width: 402px; margin: 0 auto; padding: 24px 20px; }
    .settings-row {
      display:flex; justify-content:space-between; align-items:center;
      padding: 16px 4px; border-bottom: 1px solid #efece1;
      font-family:'DM Sans', sans-serif; color:#3a3928;
    }
    .settings-row .label { font-size: 15px; }
    .settings-row .value { font-size: 14px; color:#8a8c6a; }
    .signout-btn {
      display:block; width:100%; margin-top:32px; padding:14px;
      background:#566B2C; color:#fff; border:none; border-radius:24px;
      font-size:15px; cursor:pointer;
    }
    .signout-btn:hover { background:#44551F; }
    /* 测试版：登出暂时禁用的外观 */
    .signout-btn.disabled { background:#c9cbb6; cursor:not-allowed; }
    .signout-btn.disabled:hover { background:#c9cbb6; }
  </style>
</head>
<body>

  <div class="top-bar">
    <span class="logo" style="cursor:pointer" onclick="location.href='home.html'">✦ MEMLO</span>
    <div class="icons">
      <span style="cursor:pointer; color:var(--text-sub)">?</span>
      <span style="cursor:pointer; color:var(--text-sub)">👤</span>
    </div>
  </div>

  <div class="main-content" style="padding-top:24px;">
    <h1 class="main-title" style="font-size:28px;">Settings</h1>
    <p class="sub-title">Manage your tree and account</p>
  </div>

  <div class="settings-list">
    <div class="settings-row"><span class="label">Name</span><span class="value" id="nameVal">—</span></div>
    <div class="settings-row"><span class="label">Email</span><span class="value" id="emailVal">—</span></div>
    <div class="settings-row"><span class="label">Records</span><span class="value" id="countVal">—</span></div>
    <div class="settings-row"><span class="label">Tree stage</span><span class="value" id="stageVal">—</span></div>
    <button class="signout-btn disabled" id="signoutBtn">Sign out</button>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="location.href='review.html'">
      <img class="nav-icon" width="22" height="22" src="iconAsset/place%201.svg" alt="">FOREST
    </button>
    <button class="nav-item" onclick="location.href='home.html'">
      <img class="nav-icon" width="22" height="22" src="iconAsset/My%20tree.svg" alt="">GARDENING
    </button>
    <button class="nav-item active">
      <img class="nav-icon" width="22" height="22" src="iconAsset/Setting%20.svg" alt="">SETTING
    </button>
  </nav>

  <script type="module">
    import { db, auth } from './firebase.js';
    import { doc, onSnapshot }
      from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { onAuthStateChanged, signInAnonymously }
      from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    var authTimeout = setTimeout(function() {
      document.getElementById('nameVal').textContent = '(offline)';
      document.getElementById('emailVal').textContent = '(offline)';
    }, 5000);

    var unsubUser = null;
    function subscribeUserDoc(uid, fallbackEmail) {
      if (unsubUser) { unsubUser(); unsubUser = null; }
      document.getElementById('emailVal').textContent = fallbackEmail || '—';
      unsubUser = onSnapshot(doc(db, 'users', uid), function(snap) {
        var data = snap.data() || {};
        document.getElementById('nameVal').textContent  = data.name || '—';
        document.getElementById('emailVal').textContent = data.email || fallbackEmail || '—';
        document.getElementById('countVal').textContent = (data.record_count || 0) + '';
        document.getElementById('stageVal').textContent = data.tree_stage || 'seed';
      }, function(err) {
        console.log('settings snapshot error:', err.message);
      });
    }

    // 取消账号 UI：改用 Firebase 匿名登录。原 localStorage 版（保留备查）：
    // (function checkLogin() {
    //   var lsUid = localStorage.getItem('plunk_uid');
    //   if (!lsUid) { location.href = 'index.html'; return; }
    //   subscribeUserDoc(lsUid, localStorage.getItem('plunk_email'));
    // })();
    onAuthStateChanged(auth, function(user) {
      clearTimeout(authTimeout);
      if (user) {
        subscribeUserDoc(user.uid, '');
      } else {
        signInAnonymously(auth).catch(function(e) {
          console.log('anon sign-in failed:', e.message);
        });
      }
    });

    // 测试版：暂时禁用登出。恢复账号功能时取消下面注释、删除提示版即可。
    // document.getElementById('signoutBtn').addEventListener('click', function() {
    //   localStorage.removeItem('plunk_uid');
    //   localStorage.removeItem('plunk_email');
    //   localStorage.removeItem('plunk_name');
    //   location.href = 'index.html';
    // });
    document.getElementById('signoutBtn').addEventListener('click', function() {
      alert('测试版，暂无账号功能');
    });
  </script>

</body>
</html>
